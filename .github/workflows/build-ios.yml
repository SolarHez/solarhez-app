name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
      - uses: maxim-lobanov/setup-xcode@v1

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Expo & dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Add expo-dev-client
        run: npx expo install expo-dev-client

      - name: Prebuild and Install CocoaPods
        run: |
          npx expo prebuild --platform ios --clean
          cd ios
          pod install

      - name: Locate Workspace
        run: |
          echo "Scanning ios directory for workspace files..."
          # 列出 ios 目录下的所有文件和文件夹，并递归查找 .xcworkspace
          ls -R ios/

          # 寻找 .xcworkspace 结尾的文件路径
          find ios -name "*.xcworkspace"

      - name: Build iOS archive (unsigned)
        run: |
          RAW_NAME=$(jq -r .name package.json)
          SAFE_NAME=$(echo $RAW_NAME | tr -cd '[:alnum:]_')

          xcodebuild \
            -workspace ios/$SAFE_NAME.xcworkspace \
            -scheme $SAFE_NAME \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/$SAFE_NAME.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Build and Package
        run: |
          # 1. 直接定位 .app 文件 (不需要关心 build 目录，直接在 DerivedData 中找)
          # 使用 -name 过滤出唯一结果
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData/ -name "*.app" | grep "Release-iphoneos" | head -n 1)

          echo "找到了 App: $APP_PATH"

          # 2. 构建 Payload 结构
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          # 3. 打包
          zip -r solarhezapp.ipa Payload

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: ios-onsign
          path: ./*.ipa
